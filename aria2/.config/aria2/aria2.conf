# ====== 基础设置 ======
dir=/home/ivan/Downloads
continue=true
input-file=/home/ivan/.config/aria2/aria2.session
save-session=/home/ivan/.config/aria2/aria2.session
save-session-interval=60

# ====== 线程与网络优化 ======
max-connection-per-server=16
min-split-size=10M
split=16
max-overall-download-limit=0

# ====== RPC 守护进程设置 (用于浏览器插件/网页端) ======
enable-rpc=true
rpc-allow-origin-all=true
rpc-listen-all=true
rpc-listen-port=6800
rpc-secret=ivan-aria2-secret
