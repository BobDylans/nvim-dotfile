# : Manager [[[

[mgr]
cwd = { fg = "#dbe3ed" }

# Find
find_keyword = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied = { fg = "#797dff", bg = "#797dff" }
marker_cut = { fg = "#dfe0ff", bg = "#dfe0ff" }
marker_marked = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#bdc3fa", bg = "#bdc3fa" }

# Count
count_copied = { fg = "#101744", bg = "#dfe0ff" }
count_cut = { fg = "#101744", bg = "#dfe0ff" }
count_selected = { fg = "#003350", bg = "#bdc3fa" }

# Border
border_symbol = "│"
border_style = { fg = "#90cdff" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#90cdff", bold = true, bg = "#0c141b" }
inactive = { fg = "#b6c7e9", bg = "#0c141b" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#90cdff", fg = "#003350", bold = true }
normal_alt = { bg = "#404850", fg = "#bfc7d1" }

# Select mode
select_main = { bg = "#b6c7e9", fg = "#20314c", bold = true }
select_alt = { bg = "#404850", fg = "#bfc7d1" }

# Unset mode
unset_main = { bg = "#bdc3fa", fg = "#262d5a", bold = true }
unset_alt = { bg = "#404850", fg = "#bfc7d1" }

# : ]]]


# : Status [[[

[status]
sep_left = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type = { fg = "#406dc6" }
perm_write = { fg = "#2f42ef" }
perm_read = { fg = "#ff2b12" }
perm_exec = { fg = "#464cff" }
perm_sep = { fg = "#329cff" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#90cdff", bg = "#323a42" }
progress_error = { fg = "#ffb4ab", bg = "#323a42" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#323a42" }
cand = { fg = "#90cdff" }
rest = { fg = "#003350" }
desc = { fg = "#dbe3ed" }
separator = " ▶ "
separator_style = { fg = "#dbe3ed" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#bdc3fa" }
title_warn = { fg = "#90cdff" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#90cdff" }
active = { fg = "#bdc3fa", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#90cdff" }
value = { fg = "#dbe3ed" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#90cdff", bg = "#003350" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#90cdff" }
title = {}
hovered = { fg = "#dfe0ff", underline = true }

# : ]]]


# : Help [[[

[help]
on = { fg = "#dbe3ed" }
run = { fg = "#dbe3ed" }
footer = { fg = "#20314c", bg = "#b6c7e9" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
  # Images
  { mime = "image/*", fg = "#94e2d5" },

  # Media
  { mime = "{audio,video}/*", fg = "#f9e2af" },

  # Archives
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

  # Documents
  { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

  # Fallback
  { url = "*", fg = "#dbe3ed" },
  { url = "*/", fg = "#90cdff" },
]


# : ]]]
# : Icon [[[

[icon]
# ==========================================
# 1. 预设条件 (最高优先级)
# ==========================================
prepend_conds = [
  # 隐藏的文件夹 (半透明或较暗的颜色)
  { if = "dir & hidden", text = "", fg = "#f6fbff" },

  # 普通文件夹 - 提到前面来，确保文件夹图标最先被匹配
  { if = "dir", text = "", fg = "#90cdff" },

  # 损坏的符号链接 (孤儿) - 使用 Error 色
  { if = "orphan", text = "󰌌", fg = "#ffb4ab" },
  # 正常的符号链接 - 使用 Tertiary 固定色
  { if = "link", text = "󰌷", fg = "#dfe0ff" },

  # 可执行文件 - 【关键修复：必须排除文件夹 (!dir)】
  { if = "exec & !dir", text = "󰆧", fg = "#b6c7e9" },

  # 普通隐藏文件 (暗淡的文字色)
  { if = "hidden", text = "󰈙", fg = "#bfc7d1" },
]

# ==========================================
# 2. 预设目录 (特殊文件夹图标与主色调)
# ==========================================
prepend_dirs = [
  # 使用 Primary 颜色高亮常用主目录
  { name = "Desktop", text = "", fg = "#90cdff" },
  { name = "Documents", text = "󰈙", fg = "#90cdff" },
  { name = "Downloads", text = "󰇚", fg = "#90cdff" },
  { name = "Pictures", text = "󰉏", fg = "#90cdff" },
  { name = "Music", text = "󰎆", fg = "#90cdff" },
  { name = "Videos", text = "󰕧", fg = "#90cdff" },
  { name = "Public", text = "", fg = "#90cdff" },

  # 使用 Secondary 颜色标记开发/配置目录
  { name = ".config", text = "", fg = "#b6c7e9" },
  { name = ".git", text = "󰊢", fg = "#b6c7e9" },
  { name = "Github", text = "󰊢", fg = "#b6c7e9" },
  { name = "src", text = "", fg = "#b6c7e9" },
]

# ==========================================
# 3. 预设文件扩展名
# ==========================================
prepend_exts = [
  # 图片/媒体 - 使用 Tertiary 颜色 (提供视觉对比)
  { name = "png", text = "󰉏", fg = "#bdc3fa" },
  { name = "jpg", text = "󰉏", fg = "#bdc3fa" },
  { name = "jpeg", text = "󰉏", fg = "#bdc3fa" },
  { name = "webp", text = "󰉏", fg = "#bdc3fa" },
  { name = "svg", text = "󰜡", fg = "#bdc3fa" },
  { name = "mp4", text = "󰕧", fg = "#bdc3fa" },
  { name = "mkv", text = "󰕧", fg = "#bdc3fa" },
  { name = "mp3", text = "󰎆", fg = "#bdc3fa" },
  { name = "flac", text = "󰎆", fg = "#bdc3fa" },

  # 档案/压缩包 - 使用 Error Container 相关的颜色 (以示区别，或可选 tertiary_fixed)
  { name = "zip", text = "󰛫", fg = "#bdc3fa" },
  { name = "tar", text = "󰛫", fg = "#bdc3fa" },
  { name = "gz", text = "󰛫", fg = "#bdc3fa" },
  { name = "rar", text = "󰛫", fg = "#bdc3fa" },
  { name = "7z", text = "󰛫", fg = "#bdc3fa" },

  # 常用代码/配置文件 - 使用 Primary 或 On Surface 色
  { name = "conf", text = "", fg = "#90cdff" },
  { name = "toml", text = "", fg = "#90cdff" },
  { name = "yaml", text = "", fg = "#90cdff" },
  { name = "yml", text = "", fg = "#90cdff" },
  { name = "json", text = "", fg = "#90cdff" },
  { name = "sh", text = "", fg = "#90cdff" },
  { name = "bash", text = "", fg = "#90cdff" },
  { name = "py", text = "", fg = "#90cdff" },
  { name = "rs", text = "", fg = "#90cdff" },
  { name = "c", text = "", fg = "#90cdff" },
  { name = "cpp", text = "", fg = "#90cdff" },
  { name = "md", text = "", fg = "#90cdff" },
  { name = "txt", text = "󰈙", fg = "#dbe3ed" },
]

# ==========================================
# 4. 预设特定文件名
# ==========================================
prepend_files = [
  { name = "PKGBUILD", text = "", fg = "#90cdff" },
  { name = "README.md", text = "󰂺", fg = "#b6c7e9" },
  { name = "Makefile", text = "", fg = "#b6c7e9" },
  { name = ".bashrc", text = "", fg = "#b6c7e9" },
  { name = ".zshrc", text = "", fg = "#b6c7e9" },
]

# : ]]]
