include hyde.conf
include dank-tabs.conf
include dank-theme.conf

sync_to_monitor no
window_padding_width 5
hide_window_decorations yes
background_opacity 0.78
font_family VictorMono Nerd Font
font_size 13.5
line_spacing 2

# 性能优化
repaint_delay 10
input_delay 3
sync_gpu_stress
scrollback_lines 10000

# 显示优化
disable_ligatures never
remember_window_size no
confirm_os_window_close 0
shell fish
cursor_trail 10
cursor_trail_decay 0.05 0.3
cursor_trail_start_threshold 0
cursor_shape block
shell_integration no-cursor
# cursor #87CEE8
# cursor_text_color #1a1a1a

# 滚动条位置指示器（右下角半透明标记）
scrollback_indicator_opacity 0.6

# kitty 原生选中即复制（配合 Shift+鼠标选中）
copy_on_select yes

# 关闭提示音和视觉提示
enable_audio_bell no
visual_bell_duration 0

# 粘贴行为优化：大内容确认，替换危险控制字符
paste_actions confirm-if-large,replace-dangerous-control-codes

# URL 链接样式
url_color #87CEEB
url_style curly
open_url_with default
detect_urls yes

# 初始窗口大小
initial_window_width  120c
initial_window_height 35c

map ctrl+shift+s kitten screenshot
map alt+insert kitten kitty_grab/grab.py

map alt+left  previous_tab
map alt+right next_tab

# BEGIN_KITTY_THEME
# Ayu
include current-theme.conf
# END_KITTY_THEME